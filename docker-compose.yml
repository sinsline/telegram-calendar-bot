version: '3.8'

services:
  telegram-calendar-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-calendar-bot:latest
    container_name: telegram-calendar-bot
    restart: unless-stopped
    
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_CALENDAR_ID=${GOOGLE_CALENDAR_ID:-}
      - GOOGLE_CREDENTIALS_FILE=${GOOGLE_CREDENTIALS_FILE:-}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-20}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    
    volumes:
      # Persistent data storage
      - ./data:/app/data
      - ./logs:/app/logs
      # Google credentials (if using file-based auth)
      - ./credentials.json:/app/credentials.json:ro
      # Configuration
      - ./.env:/app/.env:ro
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    
    # Health check
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Network (if you need to connect to other services)
    # networks:
    #   - bot-network

